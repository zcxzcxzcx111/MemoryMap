<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Geometry — Q 版角色重设计方案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F5F2ED;
    font-family: -apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif;
    color: #2C2C2C;
    min-height: 100vh;
    padding: 60px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 60px;
  }
  .header h1 {
    font-size: 13px;
    font-family: 'Consolas', 'Courier New', monospace;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 12px;
  }
  .header h2 {
    font-size: 36px;
    font-weight: 600;
    color: #2C2C2C;
    margin-bottom: 8px;
  }
  .header p {
    font-size: 14px;
    color: #888;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    max-width: 960px;
    margin: 0 auto;
  }

  .card {
    background: transparent;
    border-radius: 20px;
    padding: 24px 16px 18px;
    text-align: center;
    transition: transform 0.3s;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
  }

  .card .label {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #BBB;
    margin-bottom: 6px;
  }
  .card .name {
    font-size: 15px;
    font-weight: 600;
    color: #444;
    margin-bottom: 4px;
  }
  .card .scene {
    font-size: 12px;
    color: #AAA;
    margin-bottom: 16px;
  }

  .card .char-container {
    width: 100%;
    height: 160px;
    margin: 0 auto 12px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card .char-container svg {
    width: 140px;
    height: 160px;
  }

  .palette {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }
  .palette .swatch {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.06);
  }

  /* Character animations */
  @keyframes gentle-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  @keyframes soft-blink {
    0%, 42%, 58%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.05); }
  }
  @keyframes scarf-drift {
    0%, 100% { transform: skewX(0deg); }
    50% { transform: skewX(4deg); }
  }
  @keyframes arm-sway {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(12deg); }
  }
  @keyframes bag-pendulum {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(10deg); }
  }
  @keyframes steam-rise {
    0% { transform: translateY(0); opacity: 0.5; }
    100% { transform: translateY(-10px); opacity: 0; }
  }
  @keyframes wave-hand {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(15deg); }
    75% { transform: rotate(-8deg); }
  }
  @keyframes chopstick-move {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  @keyframes walk-cycle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes foot-kick {
    0%, 100% { transform: rotate(0deg); }
    30% { transform: rotate(12deg); }
  }
  @keyframes keyboard-tap {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(2px); }
  }

  .char-float { animation: gentle-float 3.5s ease-in-out infinite; }
  .char-float-d1 { animation: gentle-float 3.5s ease-in-out infinite; animation-delay: 0.3s; }
  .char-float-d2 { animation: gentle-float 3.5s ease-in-out infinite; animation-delay: 0.6s; }
  .char-float-d3 { animation: gentle-float 3.5s ease-in-out infinite; animation-delay: 0.9s; }

  .footer {
    text-align: center;
    margin-top: 60px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: #CCC;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- Sticker filter definition -->
<svg style="position:absolute;width:0;height:0;">
  <defs>
    <filter id="sticker" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology operator="dilate" radius="4" in="SourceAlpha" result="expanded"/>
      <feFlood flood-color="white" result="white"/>
      <feComposite in="white" in2="expanded" operator="in" result="whiteOutline"/>
      <feMerge>
        <feMergeNode in="whiteOutline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sticker-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feMorphology operator="dilate" radius="5" in="SourceAlpha" result="expanded"/>
      <feFlood flood-color="white" result="white"/>
      <feComposite in="white" in2="expanded" operator="in" result="whiteOutline"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="shadow"/>
      <feOffset dx="1" dy="2" result="offsetShadow"/>
      <feFlood flood-color="rgba(0,0,0,0.12)" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetShadow" operator="in" result="coloredShadow"/>
      <feMerge>
        <feMergeNode in="coloredShadow"/>
        <feMergeNode in="whiteOutline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>

<div class="header">
  <h1>Soft Geometry</h1>
  <h2>Q 版角色重设计方案</h2>
  <p>扁平简约风 · 圆润比例 · 柔和配色<br>点击卡片查看动态效果</p>
</div>

<div class="grid">

  <!-- 1. Selfie / 拍照 -->

    <div class="name">拍照</div>
    <div class="scene">Selfie</div>

        <line x1="70" y1="112" x2="74" y2="132" stroke="#FFD93D" stroke-width="5" stroke-linecap="round"/>
        <!-- Head -->
        <circle cx="60" cy="48" r="30" fill="#FFD93D"/>
        <!-- Hair -->

        </g>
        <!-- Blush -->
        <ellipse cx="40" cy="56" rx="6" ry="3.5" fill="#FFB6C1" opacity="0.4"/>
        <ellipse cx="80" cy="56" rx="6" ry="3.5" fill="#FFB6C1" opacity="0.4"/>
        <!-- Smile -->
        <path d="M52 58 Q60 66 68 58" fill="none" stroke="#E88B7A" stroke-width="2" stroke-linecap="round"/>
        <!-- Arm with phone -->

        <!-- Right arm -->

      </svg>

    <div class="palette">

      <div class="swatch" style="background:#FFD93D"></div>
      <div class="swatch" style="background:#8B6C5C"></div>
      <div class="swatch" style="background:#FFB6C1"></div>
    </div>
  </div>

          <circle cx="71" cy="43" r="1" fill="white"/>
        </g>
        <!-- Blush -->
        <ellipse cx="43" cy="52" rx="5" ry="3" fill="#FFB6C1" opacity="0.35"/>
        <ellipse cx="77" cy="52" rx="5" ry="3" fill="#FFB6C1" opacity="0.35"/>
        <!-- Smile -->
        <path d="M53 53 Q60 59 67 53" fill="none" stroke="#E88B7A" stroke-width="2" stroke-linecap="round"/>

        <g style="transform-origin: 60px 80px; animation: arm-sway 2s ease-in-out infinite;">

          <ellipse cx="102" cy="68" rx="6" ry="10" fill="#A88B6C" transform="rotate(-25 102 68)"/>
          <line x1="38" y1="80" x2="30" y2="88" stroke="#FFD93D" stroke-width="5" stroke-linecap="round"/>
          <line x1="82" y1="80" x2="88" y2="76" stroke="#FFD93D" stroke-width="5" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <div class="palette">
      <div class="swatch" style="background:#E87B6B"></div>
      <div class="swatch" style="background:#8EC8D8"></div>
      <div class="swatch" style="background:#D4A574"></div>
      <div class="swatch" style="background:#D46B6B"></div>
    </div>
  </div>

  <!-- 3. Dining / 美食 -->
  <div class="card">
    <div class="label">03</div>
    <div class="name">美食</div>
    <div class="scene">Dining</div>
    <div class="char-container">
      <svg viewBox="0 0 120 140" class="char-float-d2" filter="url(#sticker-shadow)">

        <rect x="38" y="72" width="44" height="38" rx="12" fill="#6BC5B8"/>

        <ellipse cx="78" cy="53" rx="5" ry="3" fill="#FFB6C1" opacity="0.4"/>
        <!-- Open mouth -->

        <g style="transform-origin: 82px 82px; animation: chopstick-move 2.5s ease-in-out infinite;">
          <line x1="82" y1="82" x2="96" y2="60" stroke="#FFD93D" stroke-width="5" stroke-linecap="round"/>
          <line x1="92" y1="62" x2="100" y2="48" stroke="#8B6C5C" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="96" y1="64" x2="104" y2="50" stroke="#8B6C5C" stroke-width="2.5" stroke-linecap="round"/>

        <ellipse cx="36" cy="93" rx="12" ry="5" fill="#FFF5E6"/>
        <circle cx="33" cy="92" r="2" fill="#FFD93D"/>
        <circle cx="38" cy="91" r="1.5" fill="#90C695"/>

    </div>
    <div class="palette">

      <div class="swatch" style="background:#FFD93D"></div>

  <!-- 4. Hiking / 登山 -->
  <div class="card">

    <div class="name">登山</div>
    <div class="scene">Hiking</div>
    <div class="char-container">
      <svg viewBox="0 0 120 140" class="char-float-d3" filter="url(#sticker-shadow)">

        <polygon points="0,95 30,50 60,95" fill="#90C695" opacity="0.25"/>
        <polygon points="40,95 75,40 110,95" fill="#7CB87C" opacity="0.2"/>
        <!-- Body -->
        <rect x="38" y="68" width="44" height="40" rx="12" fill="#5B9A6B"/>
        <!-- Zipper -->
        <line x1="60" y1="72" x2="60" y2="106" stroke="#4A8A5A" stroke-width="1.5"/>
        <!-- Legs -->
        <g style="animation: walk-cycle 1.2s ease-in-out infinite;">

        <rect x="46" y="28" width="28" height="10" rx="5" fill="#5B9A6B"/>

        <!-- Left arm -->

      <div class="swatch" style="background:#90C695"></div>
      <div class="swatch" style="background:#8B6C5C"></div>
    </div>
  </div>

  <!-- 5. Shopping / 购物 -->

    <div class="name">购物</div>

      <div class="swatch" style="background:#7A5C4C"></div>
      <div class="swatch" style="background:#D48A9A"></div>
    </div>
  </div>

  <!-- 6. Beach / 海边 -->
  <div class="card">
    <div class="label">06</div>
    <div class="name">海边</div>
    <div class="scene">Beach</div>
    <div class="char-container">
      <svg viewBox="0 0 120 140" class="char-float-d1" filter="url(#sticker-shadow)">
        <!-- Sun -->
        <circle cx="96" cy="20" r="12" fill="#FFD93D" opacity="0.5"/>
        <line x1="96" y1="4" x2="96" y2="0" stroke="#FFD93D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
        <line x1="108" y1="12" x2="112" y2="8" stroke="#FFD93D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
