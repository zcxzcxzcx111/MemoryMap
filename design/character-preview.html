<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryMap 角色形象预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      color: white;
      font-size: 28px;
      margin-bottom: 8px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.25);
    }
    .card img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    .card .scene-name {
      font-size: 18px;
      font-weight: 700;
      color: #333;
      margin-bottom: 4px;
    }
    .card .scene-key {
      font-size: 13px;
      color: #999;
      font-family: 'SF Mono', Consolas, monospace;
    }
    .card .scene-emoji {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .missing {
      opacity: 0.4;
      border: 3px dashed #ccc;
      background: #f9f9f9;
    }
    .missing .scene-name { color: #999; }
    .status {
      text-align: center;
      margin-top: 40px;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
    }
    .status .ok { color: #a8e6a3; }
    .status .warn { color: #ffd93d; }
  </style>
</head>
<body>
  <h1>MemoryMap Q版角色形象</h1>
  <p class="subtitle">9 个场景 · 抠图贴纸风格 · 256×256 PNG</p>

  <div class="grid">
    <div class="card">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/selfie.png" alt="selfie">
      <div class="scene-name">拍照</div>
      <div class="scene-key">selfie</div>
    </div>
    <div class="card">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/rowing.png" alt="rowing">
      <div class="scene-name">划船</div>
      <div class="scene-key">rowing</div>
    </div>
    <div class="card">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/dining.png" alt="dining">
      <div class="scene-name">美食</div>
      <div class="scene-key">dining</div>
    </div>
    <div class="card">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/hiking.png" alt="hiking">
      <div class="scene-name">登山</div>
      <div class="scene-key">hiking</div>
    </div>
    <div class="card">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/shopping.png" alt="shopping">
      <div class="scene-name">购物</div>
      <div class="scene-key">shopping</div>
    </div>
    <div class="card">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/beach.png" alt="beach">
      <div class="scene-name">海边</div>
      <div class="scene-key">beach</div>
    </div>
    <div class="card missing">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/park.png" alt="park">
      <div class="scene-name">公园 ⚠️</div>
      <div class="scene-key">park · 旧版裁切</div>
    </div>
    <div class="card">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/city.png" alt="city">
      <div class="scene-name">城市</div>
      <div class="scene-key">city</div>
    </div>
    <div class="card">
      <div class="scene-emoji"></div>
      <img src="/assets/characters/travel.png" alt="travel">
      <div class="scene-name">旅行</div>
      <div class="scene-key">travel</div>
    </div>
  </div>

  <div class="status">
    <span class="ok">8/9 已替换为抠图贴纸版</span> ·
    <span class="warn">park.png 仍为旧版裁切图（源文件缺失）</span>
  </div>
</body>
</html>
